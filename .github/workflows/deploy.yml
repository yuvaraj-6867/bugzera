name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npx vite build

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 to known hosts
        run: ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH connection
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: ssh -v -o StrictHostKeyChecking=no ${EC2_USER}@${EC2_HOST} "echo SSH_OK && docker ps --format '{{.Names}}'"

      - name: SCP dist to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          tar -czf /tmp/frontend-dist.tar.gz -C frontend/dist .
          ls -lh /tmp/frontend-dist.tar.gz
          scp -v -o StrictHostKeyChecking=no /tmp/frontend-dist.tar.gz ${EC2_USER}@${EC2_HOST}:/tmp/frontend-dist.tar.gz

      - name: Deploy on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no ${EC2_USER}@${EC2_HOST} "
            mkdir -p /tmp/bugzera-dist &&
            tar -xzf /tmp/frontend-dist.tar.gz -C /tmp/bugzera-dist &&
            docker cp /tmp/bugzera-dist/. bugzera-frontend-1:/usr/share/nginx/html/ &&
            docker exec bugzera-frontend-1 nginx -s reload &&
            rm -rf /tmp/bugzera-dist /tmp/frontend-dist.tar.gz &&
            echo 'Deployed OK'
          "

  deploy-backend:
    name: Deploy Backend (run migrations)
    runs-on: ubuntu-latest
    needs: deploy-frontend
    steps:
      - name: Run DB migrations on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker exec bugzera-backend-1 bundle exec rails db:migrate RAILS_ENV=production
            echo "✅ Migrations done"
