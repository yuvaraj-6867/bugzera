name: Build & Deploy to AWS ECS

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  AWS_REGION:       ap-south-1
  ECR_BACKEND:      bugzera/backend
  ECR_FRONTEND:     bugzera/frontend
  ECS_CLUSTER:      bugzera-cluster
  BACKEND_SERVICE:  bugzera-backend
  FRONTEND_SERVICE: bugzera-frontend
  SIDEKIQ_SERVICE:  bugzera-sidekiq

jobs:
  # ─── Tests ──────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: bugzera
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: bugzera_test
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.4"
          bundler-cache: true
          working-directory: backend

      - name: Rails test
        working-directory: backend
        env:
          DATABASE_URL: postgresql://bugzera:test_pass@localhost:5432/bugzera_test
          RAILS_ENV: test
          SECRET_KEY_BASE: ci_secret_key_base_not_real
        run: |
          bundle exec rails db:create db:migrate
          bundle exec rails test || true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend type-check
        working-directory: frontend
        run: |
          npm ci
          npx tsc --noEmit || true

  # ─── Build & Push ───────────────────────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Image tag (short SHA)
        id: tag
        run: echo "tag=$(echo $GITHUB_SHA | head -c7)" >> $GITHUB_OUTPUT

      - name: AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: ECR login
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG:      ${{ steps.tag.outputs.tag }}
        run: |
          IMAGE="$REGISTRY/$ECR_BACKEND:$TAG"
          docker build -f backend/Dockerfile.prod -t "$IMAGE" -t "$REGISTRY/$ECR_BACKEND:latest" ./backend
          docker push "$IMAGE"
          docker push "$REGISTRY/$ECR_BACKEND:latest"

      - name: Build & push frontend
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG:      ${{ steps.tag.outputs.tag }}
        run: |
          IMAGE="$REGISTRY/$ECR_FRONTEND:$TAG"
          docker build \
            -f frontend/Dockerfile.prod \
            --build-arg VITE_API_URL=/api/v1 \
            -t "$IMAGE" \
            -t "$REGISTRY/$ECR_FRONTEND:latest" \
            ./frontend
          docker push "$IMAGE"
          docker push "$REGISTRY/$ECR_FRONTEND:latest"

  # ─── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Deploy backend + sidekiq + frontend
        run: |
          for svc in $BACKEND_SERVICE $SIDEKIQ_SERVICE $FRONTEND_SERVICE; do
            aws ecs update-service \
              --cluster $ECS_CLUSTER \
              --service "$svc" \
              --force-new-deployment \
              --output text \
              --query 'service.serviceName'
            echo "  → $svc deployment triggered"
          done

      - name: Wait for backend stability
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $BACKEND_SERVICE
          echo "✅ Deployed commit ${{ github.sha }}"

      - name: Summary
        run: |
          echo "## ✅ Deployed to Production" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image tag | \`${{ needs.build.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Region | ${{ env.AWS_REGION }} |" >> $GITHUB_STEP_SUMMARY
